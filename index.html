<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WebShield - Cyber Security</title>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #020617, #0f172a);
        color: white;
        text-align: center;
    }

    h1 {
        margin-top: 40px;
        font-size: 42px;
        background: linear-gradient(90deg, #38bdf8, #a855f7);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .container {
        margin-top: 50px;
    }

    input {
        width: 400px;
        padding: 14px;
        border-radius: 12px;
        border: none;
        font-size: 16px;
        outline: none;
    }

    button {
        margin-top: 15px;
        padding: 14px 30px;
        border-radius: 12px;
        border: none;
        font-weight: bold;
        background: linear-gradient(90deg, #38bdf8, #6366f1);
        color: white;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        transform: scale(1.05);
    }

    .card {
        margin-top: 40px;
        width: 420px;
        margin-left: auto;
        margin-right: auto;
        padding: 25px;
        border-radius: 20px;
        backdrop-filter: blur(20px);
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        display: none;
    }

    .safe {
        border-left: 6px solid #22c55e;
    }

    .fake {
        border-left: 6px solid #ef4444;
    }

    .suspicious {
        border-left: 6px solid #facc15;
    }

    .badge {
        padding: 6px 14px;
        border-radius: 20px;
        font-weight: bold;
        display: inline-block;
        margin-bottom: 10px;
    }

    .green { background: #14532d; }
    .red { background: #7f1d1d; }
    .yellow { background: #713f12; }

    ul {
        text-align: left;
        margin-top: 10px;
    }
</style>
</head>

<body>

<h1>🔐 WebShield</h1>
<p>Advanced Phishing URL Detection System</p>

<div class="container">
    <input type="text" id="urlInput" placeholder="Enter URL (https://...)" />
    <br>
    <button onclick="checkURL()">Analyze URL</button>
</div>

<div id="resultCard" class="card"></div>

<script>
function checkURL() {
    let url = document.getElementById("urlInput").value;

    fetch("http://127.0.0.1:5000/check", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({url: url})
    })
    .then(res => res.json())
    .then(data => {

        let card = document.getElementById("resultCard");

        let className = "";
        let badgeColor = "";

        if (data.result === "Fake") {
            className = "card fake";
            badgeColor = "red";
        } else if (data.result === "Suspicious") {
            className = "card suspicious";
            badgeColor = "yellow";
        } else {
            className = "card safe";
            badgeColor = "green";
        }

        card.className = className;
        card.style.display = "block";

        card.innerHTML = `
            <div class="badge ${badgeColor}">${data.result}</div>

            <h2>Score: ${data.score} | Risk: ${data.risk}%</h2>

            <p><b>Domain:</b> ${data.domain}</p>
            <p><b>Length:</b> ${data.length}</p>
            <p><b>Dots:</b> ${data.dots}</p>
            <p><b>Hyphens:</b> ${data.hyphens}</p>
            <p><b>HTTPS:</b> ${data.https}</p>

            <h3>Reasons:</h3>
            <ul>
                ${data.reasons.map(r => `<li>${r}</li>`).join("")}
            </ul>
        `;
    });
}
</script>

</body>
</html>
